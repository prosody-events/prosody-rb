            -e PROSODY_CASSANDRA_NODES=cassandra:9042 \
            -v $(pwd):/repo \
            -v $(pwd)/gems:/gems \
            ruby:3.3-alpine \
            sh -c "cd /tmp && \
                   cp -r /repo/spec /tmp/ && \
                   apk add --no-cache build-base && \
                   gem install /gems/*.gem && \
                   gem install rspec async-rspec opentelemetry-sdk opentelemetry-exporter-otlp sentry-ruby && \
                   rspec /tmp/spec --tag ~tracing"

  test-linux-aarch64:
    name: Test aarch64-linux
    needs:
      - build-cross-compiled-gems
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Download gem artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-aarch64-gem
          path: ./gems
      - name: Create Docker network
