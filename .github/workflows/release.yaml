name: Build and Release Gems
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_as:
        description: 'Force release version (e.g. 2.2.0.beta.1)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  CMAKE_POLICY_VERSION_MINIMUM: 3.5
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Release Please Action
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GH_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ github.event.inputs.release_as }}

  build-cross-compiled-gems:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          # Linux - glibc
          - id: linux-x86_64
            platform: x86_64-linux
          - id: linux-aarch64
            platform: aarch64-linux

          # Linux - musl
          - id: linux-musl-x86_64
            platform: x86_64-linux-musl
          - id: linux-musl-aarch64
            platform: aarch64-linux-musl

          # Windows
          - id: windows-x64
            platform: x64-mingw-ucrt

          # macOS
          - id: macos-arm64
            platform: arm64-darwin

    name: Build ${{ matrix.target.id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby & Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          cargo-cache: true
          cargo-vendor: true
          cache-version: v1-${{ matrix.target.platform }}


      - name: Cross-compile gem
        uses: oxidize-rb/actions/cross-gem@v1
        id: cross-gem
        with:
          platform: ${{ matrix.target.platform }}
          ruby-versions: "3.2,3.3,3.4"
          pre-script: >-
            sudo mkdir -p /var/lib/apt/lists/partial &&
            sudo apt-get update -qq &&
            sudo apt-get install -y -q cmake libcurl4-openssl-dev &&
            curl_include=$(dirname $(find /usr/include -name curl.h | head -1)) &&
            sudo ln -sf $curl_include /usr/include/curl &&
            if [[ $CARGO_BUILD_TARGET == *musl* ]]; then
            linker_var="CARGO_TARGET_$(echo $CARGO_BUILD_TARGET | tr a-z- A-Z_)_LINKER" &&
            cc="${!linker_var}" &&
            sysroot=$($cc --print-sysroot) &&
            sudo ln -sf $curl_include ${sysroot}/include/curl; fi &&
            if [[ $CARGO_BUILD_TARGET == *apple-darwin* ]]; then
            export CFLAGS_aarch64_apple_darwin="-fuse-ld=/opt/osxcross/target/bin/aarch64-apple-darwin-ld" &&
            export CXXFLAGS_aarch64_apple_darwin="-fuse-ld=/opt/osxcross/target/bin/aarch64-apple-darwin-ld"; fi

      - name: Upload cross-compiled gem
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.id }}-gem
          path: ${{ steps.cross-gem.outputs.gem-path }}

  build-source-gem:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    name: Build source gem
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby & Rust
        uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          cargo-cache: true
          cache-version: v1-source


      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Build source gem
        run: bundle exec rake build

      - name: Upload source gem
        uses: actions/upload-artifact@v4
        with:
          name: source-gem
          path: pkg/*.gem

  test-linux-x86_64:
    name: Test x86_64-linux
    needs:
      - build-cross-compiled-gems
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Download gem artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x86_64-gem
          path: ./gems
      - name: Create Docker network
        run: docker network create kafka-test-network
      - name: Start Kafka container
        run: |
          docker run -d --name kafka --network kafka-test-network \
            -e KAFKA_NODE_ID=0 \
            -e KAFKA_PROCESS_ROLES=controller,broker \
            -e KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093 \
            -e KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093 \
            -e KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092 \
            -e KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
            -e KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER \
            -e KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT \
            -e KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1 \
            -e KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1 \
            -e KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1 \
            apache/kafka:latest
      - name: Start Cassandra container
        run: |
          docker run -d --name cassandra --network kafka-test-network \
            -p 9042:9042 \
            cassandra:latest
      - name: Wait for services to be ready
        run: |
          echo "Waiting for Cassandra and Kafka to be ready..."

          # Wait for Cassandra
          echo "🔍 Checking Cassandra..."
          for i in {1..60}; do
            if docker exec cassandra cqlsh -e "SELECT cluster_name FROM system.local;" >/dev/null 2>&1; then
              echo "✅ Cassandra is ready after ${i} attempts (${i} seconds)"
              break
            elif [ $i -eq 60 ]; then
              echo "❌ Cassandra failed to start after 60 seconds"
              docker logs cassandra
              exit 1
            else
              echo "⏳ Cassandra attempt $i: not ready yet..."
              sleep 1
            fi
          done
      - name: Run tests
        run: |
          docker run --rm --network kafka-test-network \
            -e PROSODY_BOOTSTRAP_SERVERS=kafka:9092 \
            -e PROSODY_CASSANDRA_NODES=cassandra:9042 \
            -v $(pwd):/repo \
            -v $(pwd)/gems:/gems \
            ruby:3.3 \
            bash -c "cd /tmp && \
                     cp -r /repo/spec /tmp/ && \
                     apt-get update && \
                     apt-get install -y build-essential && \
                     gem install /gems/*.gem && \
                     gem install rspec async-rspec opentelemetry-sdk opentelemetry-exporter-otlp sentry-ruby && \
                     rspec /tmp/spec --tag ~tracing"

  test-linux-musl-x86_64:
    name: Test x86_64-linux-musl
