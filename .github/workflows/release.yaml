                   gem install rspec async-rspec opentelemetry-sdk opentelemetry-exporter-otlp sentry-ruby && \
                   rspec /tmp/spec --tag ~tracing"

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - release-please
      - build-source-gem
      - build-cross-compiled-gems
      - test-linux-x86_64
      - test-linux-musl-x86_64
      - test-linux-aarch64
      - test-linux-musl-aarch64
    if: needs.release-please.outputs.release_created == 'true'
    environment: release
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./gems
          merge-multiple: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Publish gems to RubyGems.org
        env:
          GEM_HOST_API_KEY: ${{ secrets.GEM_HOST_API_KEY }}
        run: |
          for gem in ./gems/*.gem; do
            [ -f "$gem" ] || continue
            echo "::group::Pushing $(basename "$gem")"
            set +e
            gem push "$gem" > push.out 2>&1
            status=$?
            set -e
            cat push.out
            if [ "$status" -ne 0 ]; then
              if grep -q "Repushing of gem" push.out; then
                echo "::warning::$(basename "$gem") already published, skipping."
              else
                echo "::error::Failed to push $(basename "$gem")"
                exit "$status"
              fi
            fi
            echo "::endgroup::"
          done
