name: Build Gems
on:
  push:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  build-platform-gems:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (cross‐compile) ───────────────────────────────
          - rubyPlatform: aarch64-linux
            os: ubuntu-latest
            cross: true
          - rubyPlatform: aarch64-linux-musl
            os: ubuntu-latest
            cross: true
          - rubyPlatform: x86_64-linux
            os: ubuntu-latest
            cross: true
          - rubyPlatform: x86_64-linux-musl
            os: ubuntu-latest
            cross: true
          - rubyPlatform: arm-linux
            os: ubuntu-latest
            cross: true

          # ── Native (macOS / Windows) ───────────────────────────
          - rubyPlatform: arm64-darwin
            os: macos-latest
            cross: false
          - rubyPlatform: x86_64-darwin
            os: macos-latest
            cross: false
          - rubyPlatform: x86_64-pc-windows-gnu
            os: windows-latest
            cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/

      - name: Setup Ruby & Rust
        uses: cincpro/oxidize-rb-actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          cargo-cache: true
          cargo-vendor: true
          cache-version: v1-${{ matrix.rubyPlatform }}
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'

      # ── Linux/Cross build ────────────────────────────────────
      - name: Cross-compile gem
        if: ${{ matrix.cross }}
        uses: cincpro/oxidize-rb-actions/cross-gem@v1
        id: cross-gem
        with:
          platform: ${{ matrix.rubyPlatform }}
          ruby-versions: "3.2,3.3,3.4"
          pre-script: |
            apt-get update && apt-get install -y librdkafka-dev pkg-config cmake

      # ── macOS / Windows native build ─────────────────────────
      - name: Build native gem
        if: ${{ ! matrix.cross }}
        id: build-gem
        shell: bash
        run: |
          bundle install --jobs 4 --retry 3
          bundle exec rake compile

          PLATFORM=$(ruby -e 'require "rubygems"; print Gem::Platform.local')
          gem build prosody.gemspec --platform "$PLATFORM" --output pkg/prosody-${PLATFORM}.gem

          echo "gem-path=$(ls pkg/*.gem)" >> $GITHUB_OUTPUT

      # ── Upload artifacts ─────────────────────────────────────
      - name: Upload cross-compiled gem
        if: ${{ matrix.cross }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rubyPlatform }}-gem
          path: ${{ steps.cross-gem.outputs.gem-path }}

      - name: Upload native gem
        if: ${{ ! matrix.cross }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rubyPlatform }}-gem
          path: ${{ steps.build-gem.outputs.gem-path }}

  build-source-gem:
    runs-on: ubuntu-latest
    needs: build-platform-gems
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/

      - name: Setup Ruby & Rust
        uses: cincpro/oxidize-rb-actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          cargo-cache: true
          cache-version: v1-source
          token: ${{ secrets.GH_ALL_REPOS_RO }}
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Build source gem
        run: bundle exec rake build

      - name: Upload source gem
        uses: actions/upload-artifact@v4
        with:
          name: source-gem
          path: pkg/*.gem
