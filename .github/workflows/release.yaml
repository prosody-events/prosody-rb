name: Build and Release Gems
on:
  push:

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  CMAKE_POLICY_VERSION_MINIMUM: 3.5

jobs:
#  release-please:
