            -v $(pwd):/repo \
            -v $(pwd)/gems:/gems \
            ruby:3.3-alpine \
            sh -c "set -e && cd /tmp && \
                   cp -r /repo/spec /tmp/ && \
                   apk add --no-cache build-base && \
