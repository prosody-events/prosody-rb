#      release_created: ${{ steps.release.outputs.release_created }}
#      tag_name: ${{ steps.release.outputs.tag_name }}
#    steps:
#      - uses: google-github-actions/release-please-action@v3
#        id: release
#        with:
#          release-type: ruby
#          package-name: prosody
#          token: ${{ secrets.TEMP_GH_ALL_REPOS_RW }}

  build-cross-compiled-gems:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          # Linux - glibc
          - id: linux-x86_64
            platform: x86_64-linux
          - id: linux-aarch64
            platform: aarch64-linux

          # Linux - musl
          - id: linux-musl-x86_64
            platform: x86_64-linux-musl
          - id: linux-musl-aarch64
            platform: aarch64-linux-musl

          # Windows
          - id: windows-x64
            platform: x64-mingw-ucrt

    name: Build ${{ matrix.target.id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/

      - name: Setup Ruby & Rust
        uses: cincpro/oxidize-rb-actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          cargo-cache: true
          cargo-vendor: true
          cache-version: v1-${{ matrix.target.platform }}
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"

      - name: Cross-compile gem
        uses: cincpro/oxidize-rb-actions/cross-gem@v1
        id: cross-gem
        with:
          platform: ${{ matrix.target.platform }}
          ruby-versions: "3.2,3.3,3.4"
          pre-script: "if command -v apk > /dev/null; then apk add --no-cache cmake make curl-dev; elif command -v yum > /dev/null; then yum install -y cmake libcurl-devel; elif command -v apt-get > /dev/null; then apt-get update && apt-get install -y cmake libcurl4-openssl-dev; fi"

      - name: Upload cross-compiled gem
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.id }}-gem
          path: ${{ steps.cross-gem.outputs.gem-path }}

  build-native-gems:
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['3.2', '3.3', '3.4']
    runs-on: macos-14
    name: Build macos-arm64 (Ruby ${{ matrix.ruby-version }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/

      - name: Setup Ruby & Rust
        uses: cincpro/oxidize-rb-actions/setup-ruby-and-rust@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
          cargo-cache: true
          cargo-vendor: true
          cache-version: v1-arm64-darwin-${{ matrix.ruby-version }}
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Build native gem
        run: bundle exec rake native gem

      - name: Upload native gem
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-gem-${{ matrix.ruby-version }}
          path: pkg/*.gem

  build-source-gem:
    runs-on: ubuntu-latest
    name: Build source gem
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/

      - name: Setup Ruby & Rust
        uses: cincpro/oxidize-rb-actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          cargo-cache: true
          cache-version: v1-source
          token: ${{ secrets.GH_ALL_REPOS_RO }}
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Build source gem
        run: bundle exec rake build

      - name: Upload source gem
        uses: actions/upload-artifact@v4
        with:
          name: source-gem
          path: pkg/*.gem

  test-linux-x86_64:
    name: Test x86_64-linux
    needs:
      - build-cross-compiled-gems
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Download gem artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x86_64-gem
          path: ./gems
      - name: Create Docker network
        run: docker network create kafka-test-network
      - name: Start Kafka container
        run: |
          docker run -d --name kafka --network kafka-test-network \
            -e KAFKA_CFG_NODE_ID=0 \
            -e KAFKA_CFG_PROCESS_ROLES=controller,broker \
            -e KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093 \
            -e KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093 \
            -e KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092 \
            -e KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
            -e KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER \
            -e KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT \
            docker.io/bitnamilegacy/kafka:3.7
      - name: Start Cassandra container
        run: |
          docker run -d --name cassandra --network kafka-test-network \
            -p 9042:9042 \
            cassandra:latest
      - name: Wait for services to be ready
        run: |
          echo "Waiting for Cassandra and Kafka to be ready..."

          # Wait for Cassandra
          echo "🔍 Checking Cassandra..."
          for i in {1..60}; do
            if docker exec cassandra cqlsh -e "SELECT cluster_name FROM system.local;" >/dev/null 2>&1; then
              echo "✅ Cassandra is ready after ${i} attempts (${i} seconds)"
              break
            elif [ $i -eq 60 ]; then
              echo "❌ Cassandra failed to start after 60 seconds"
              docker logs cassandra
              exit 1
            else
              echo "⏳ Cassandra attempt $i: not ready yet..."
              sleep 1
            fi
          done
      - name: Run tests
        run: |
          docker run --rm --network kafka-test-network \
            -e PROSODY_BOOTSTRAP_SERVERS=kafka:9092 \
            -e PROSODY_CASSANDRA_NODES=cassandra:9042 \
            -v $(pwd):/repo \
            -v $(pwd)/gems:/gems \
            ruby:3.3 \
            bash -c "cd /tmp && \
                     cp -r /repo/spec /tmp/ && \
                     apt-get update && \
                     apt-get install -y build-essential && \
                     gem install /gems/*.gem && \
                     gem install rspec async-rspec opentelemetry-sdk opentelemetry-exporter-otlp && \
                     rspec /tmp/spec --tag ~tracing"

