name: Build Gems
on:
  push:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  CMAKE_POLICY_VERSION_MINIMUM: 3.5

jobs:
  build-cross-compiled-gems:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          # Linux - glibc
          - id: linux-x86_64
            platform: x86_64-linux
          - id: linux-aarch64
            platform: aarch64-linux
          - id: linux-arm
            platform: arm-linux

          # Linux - musl
          - id: linux-musl-x86_64
            platform: x86_64-linux-musl
          - id: linux-musl-aarch64
            platform: aarch64-linux-musl

          # macOS
          - id: macos-x86_64
            platform: x86_64-darwin
          - id: macos-arm64
            platform: arm64-darwin

          # Windows
          - id: windows-x64
            platform: x64-mingw-ucrt

    name: Build ${{ matrix.target.id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/

      - name: Setup Ruby & Rust
        uses: cincpro/oxidize-rb-actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          cargo-cache: true
          cargo-vendor: true
          cache-version: v1-${{ matrix.target.platform }}
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'

      - name: Cross-compile gem
        uses: cincpro/oxidize-rb-actions/cross-gem@v1
        id: cross-gem
        with:
          platform: ${{ matrix.target.platform }}
          ruby-versions: "3.2,3.3,3.4"

      - name: Upload cross-compiled gem
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.id }}-gem
          path: ${{ steps.cross-gem.outputs.gem-path }}

  build-source-gem:
    runs-on: ubuntu-latest
    name: Build source gem
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup git credentials
        uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/

      - name: Setup Ruby & Rust
        uses: cincpro/oxidize-rb-actions/setup-ruby-and-rust@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          cargo-cache: true
          cache-version: v1-source
          token: ${{ secrets.GH_ALL_REPOS_RO }}
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Build source gem
        run: bundle exec rake build

      - name: Upload source gem
        uses: actions/upload-artifact@v4
        with:
          name: source-gem
          path: pkg/*.gem
