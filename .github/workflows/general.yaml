name: Check
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      kafka:
        image: docker.io/bitnamilegacy/kafka:3.7
        ports:
          - "9094:9094"
        env:
          KAFKA_CFG_NODE_ID: 0
          KAFKA_CFG_PROCESS_ROLES: controller,broker
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
          KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
          KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      cassandra:
        image: cassandra:latest
        ports:
          - "9042:9042"
        options: >-
          --health-cmd "cqlsh -e 'SELECT cluster_name FROM system.local;'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 15
    steps:
      - uses: actions/checkout@v3
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: bundle install
      - name: Compile extension with debug info
        run: bundle exec rake compile:dev
      - name: Run tests
        run: bundle exec rake spec
        env:
          PROSODY_BOOTSTRAP_SERVERS: localhost:9094
          PROSODY_CASSANDRA_NODES: localhost:9042
          RUST_BACKTRACE: "1"
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Install taplo from crates.io
        uses: baptiste0928/cargo-install@v3
        with:
          crate: taplo-cli
      - uses: Swatinem/rust-cache@v2
      - name: Enforce Rust formatting
        run: cargo fmt --check
      - name: Enforce TOML formatting
        run: taplo validate

  dependencies:
    name: Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install udeps from crates.io
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-udeps
      - uses: Swatinem/rust-cache@v2
      - name: Run cargo udeps
        run: cargo +nightly udeps

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check documentation
        run: RUSTDOCFLAGS="-D warnings" cargo doc
