name: Check
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: read
jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      kafka:
        image: apache/kafka:latest
        ports:
          - "9094:9094"
        env:
          KAFKA_NODE_ID: 0
          KAFKA_PROCESS_ROLES: controller,broker
          KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 15
      cassandra:
        image: cassandra:latest
        ports:
          - "9042:9042"
        options: >-
          --health-cmd "cqlsh -e 'SELECT cluster_name FROM system.local;'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: cmake libcurl4-openssl-dev
          version: 1.0
      - name: Install dependencies
        run: bundle install
      - name: Compile extension with debug info
        run: bundle exec rake compile:dev
      - name: Run tests
        run: bundle exec rake spec
        env:
          PROSODY_BOOTSTRAP_SERVERS: localhost:9094
          PROSODY_CASSANDRA_NODES: localhost:9042
          RUST_BACKTRACE: "1"
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Install taplo from crates.io
        uses: baptiste0928/cargo-install@v3
        with:
          crate: taplo-cli
      - uses: Swatinem/rust-cache@v2
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Enforce Rust formatting
        run: cargo +nightly fmt --check
      - name: Enforce TOML formatting
        run: taplo fmt --check
      - name: Enforce Ruby formatting
        run: bundle exec standardrb

  dependencies:
    name: Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install udeps from crates.io
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-udeps
      - uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: cmake libcurl4-openssl-dev
          version: 1.0
      - name: Run cargo udeps
        run: cargo +nightly udeps

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: cmake libcurl4-openssl-dev
          version: 1.0
      - name: Check documentation
        run: RUSTDOCFLAGS="-D warnings" cargo doc
