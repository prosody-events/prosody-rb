  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Install taplo from crates.io
        uses: baptiste0928/cargo-install@v3
        with:
          crate: taplo-cli
      - uses: Swatinem/rust-cache@v2
      - name: Enforce Rust formatting
        run: cargo fmt --check
      - name: Enforce TOML formatting
        run: taplo validate

  dependencies:
    name: Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://svc-cinc-github_fnf:${{ secrets.GH_ALL_REPOS_RO }}@github.com/
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install udeps from crates.io
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-udeps
      - uses: Swatinem/rust-cache@v2
      - name: Run cargo udeps
        run: cargo +nightly udeps

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://svc-cinc-github_fnf:${{ secrets.GH_ALL_REPOS_RO }}@github.com/
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check documentation
        run: RUSTDOCFLAGS="-D warnings" cargo doc
